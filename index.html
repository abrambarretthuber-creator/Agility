<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Agility">
<link id="app-icon" rel="apple-touch-icon">
<title>Agility</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Epilogue:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:-webkit-fill-available;}
body{
  margin:0;font-family:'Epilogue',sans-serif;
  background:#F5F4F0;color:#1a1a1a;
  min-height:100vh;min-height:-webkit-fill-available;
  overflow:hidden;
}
#app{
  position:fixed;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;
}
#panel{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  background:#F5F4F0;
}
/* ── Tab Bar ── */
.tab-bar{
  flex-shrink:0;
  display:flex;background:#fff;
  border-top:1px solid #E8E6E0;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:10px 4px 8px;
  font-family:'Epilogue',sans-serif;font-size:10px;font-weight:600;
  letter-spacing:.06em;text-transform:uppercase;
  background:none;border:none;color:#888;cursor:pointer;
  touch-action:manipulation;min-height:56px;
}
.tab-btn.active{color:#C68B3A;}
.tab-btn svg{width:20px;height:20px;margin-bottom:3px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
/* ── Section label ── */
.section-label{
  font-size:10px;font-weight:700;letter-spacing:.12em;
  color:#888;padding:18px 16px 8px;text-transform:uppercase;
}
/* ── Daily Header ── */
.daily-header{padding:20px 16px 10px;}
.daily-header .day-name{font-size:26px;font-weight:700;line-height:1.1;}
.daily-header .date-str{font-size:14px;color:#888;margin-top:2px;}
/* ── Progress Bar ── */
.progress-wrap{height:6px;background:#E8E6E0;margin:0 16px 4px;}
.progress-bar{height:100%;background:#C68B3A;border-radius:3px;transition:width .3s ease;}
.progress-label{font-size:11px;color:#888;text-align:right;padding:2px 16px 0;margin-bottom:4px;}
/* ── All-Done Banner ── */
.all-done-banner{
  margin:12px 16px;padding:14px 16px;
  border:2px solid #C68B3A;border-radius:10px;
  background:#fff;font-size:15px;font-weight:600;
  color:#C68B3A;text-align:center;letter-spacing:.01em;
}
/* ── Pre-contest splash ── */
.precontest-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:64px 24px 48px;gap:8px;
}
.precontest-count{
  font-size:72px;font-weight:800;color:#C68B3A;line-height:1;letter-spacing:-.02em;
}
.precontest-label{
  font-size:18px;font-weight:500;color:#6b6b6b;margin-top:4px;
}
.precontest-start{
  font-size:22px;font-weight:700;color:#1a1a1a;margin-top:12px;
  border-top:2px solid #C68B3A;padding-top:16px;letter-spacing:.01em;
}
/* ── Weekly Targets ── */
.wt-row{
  display:flex;align-items:center;
  padding:12px 16px;border-bottom:1px solid #E8E6E0;
  background:#fff;gap:10px;
}
.wt-emoji{font-size:20px;width:28px;text-align:center;flex-shrink:0;}
.wt-info{flex:1;min-width:0;}
.wt-name{font-size:14px;font-weight:600;}
.wt-detail{font-size:11px;color:#888;margin-top:1px;}
.wt-count{font-size:13px;font-weight:600;color:#888;margin-right:4px;}
.wt-count.met{color:#4CAF50;}
.wt-controls{display:flex;align-items:center;gap:6px;}
.btn-pm{
  width:30px;height:30px;border-radius:50%;
  border:1.5px solid #C68B3A;background:#fff;
  color:#C68B3A;font-size:18px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;touch-action:manipulation;user-select:none;
  line-height:1;
}
.btn-pm:active{background:#C68B3A;color:#fff;}
.wt-family-btn{
  padding:6px 14px;border:1.5px solid #C68B3A;border-radius:20px;
  background:#fff;color:#C68B3A;font-family:'Epilogue',sans-serif;
  font-size:12px;font-weight:600;cursor:pointer;touch-action:manipulation;
}
/* ── Habit Rows ── */
.habit-row{
  display:flex;align-items:center;
  padding:13px 16px;border-bottom:1px solid #E8E6E0;
  background:#fff;gap:12px;cursor:pointer;
  touch-action:manipulation;
}
.habit-row.done .habit-name{text-decoration:line-through;color:#aaa;}
.habit-row.done .habit-sub{color:#ccc;}
.habit-circle{
  width:26px;height:26px;border-radius:50%;
  border:2px solid #C68B3A;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.habit-row.done .habit-circle{background:#C68B3A;border-color:#C68B3A;}
.habit-circle svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;display:none;}
.habit-row.done .habit-circle svg{display:block;}
.habit-emoji{font-size:20px;flex-shrink:0;}
.habit-info{flex:1;min-width:0;}
.habit-name{font-size:14px;font-weight:500;line-height:1.3;}
.habit-sub{font-size:11px;color:#888;margin-top:2px;}
.habit-badge{
  font-size:11px;font-weight:600;
  padding:2px 8px;border-radius:10px;
  background:#f0ede6;color:#C68B3A;
  flex-shrink:0;
}
/* ── Study counter pill ── */
.study-pill{
  display:flex;align-items:center;gap:0;
  border:1.5px solid #C68B3A;border-radius:20px;
  overflow:hidden;flex-shrink:0;
}
.study-pm{
  padding:4px 9px;background:none;border:none;
  color:#C68B3A;font-size:16px;font-weight:700;
  cursor:pointer;touch-action:manipulation;
  font-family:'Epilogue',sans-serif;
}
.study-pm:active{background:#C68B3A;color:#fff;}
.study-val{
  font-size:12px;font-weight:600;color:#C68B3A;
  padding:0 4px;white-space:nowrap;
}
/* ── Fast log button ── */
.fast-log-btn{
  padding:6px 14px;border:1.5px solid #C68B3A;border-radius:20px;
  background:#fff;color:#C68B3A;font-family:'Epilogue',sans-serif;
  font-size:12px;font-weight:600;cursor:pointer;touch-action:manipulation;
  flex-shrink:0;
}
.fast-logged-check{
  font-size:12px;font-weight:600;color:#4CAF50;
  flex-shrink:0;
}
/* ── Modality badge ── */
.modality-tag{
  font-size:11px;font-weight:600;padding:2px 8px;
  border-radius:10px;background:#e8f5e9;color:#388E3C;flex-shrink:0;
}
/* ── Weekly tab ── */
.weekly-header{
  padding:20px 16px 12px;
  display:flex;align-items:center;justify-content:space-between;
}
.weekly-header .wh-title{font-size:18px;font-weight:700;}
.weekly-header .wh-sub{font-size:12px;color:#888;margin-top:2px;}
.save-weekly-btn{
  padding:9px 18px;background:#C68B3A;color:#fff;
  border:none;border-radius:22px;
  font-family:'Epilogue',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;touch-action:manipulation;
}
.save-weekly-btn:active{background:#a8722f;}
.weekly-success{
  margin:0 16px 12px;padding:10px 14px;
  background:#e8f5e9;border-radius:8px;
  color:#388E3C;font-size:13px;font-weight:600;
  display:none;
}
.weekly-success.show{display:block;}
/* ── Check-in card ── */
.checkin-card{
  background:#fff;margin:0 0 1px;
  padding:14px 16px;border-bottom:1px solid #E8E6E0;
}
.checkin-label{
  font-size:13px;font-weight:700;margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.checkin-input{
  width:100%;padding:9px 12px;
  border:1.5px solid #E8E6E0;border-radius:8px;
  font-family:'Epilogue',sans-serif;font-size:14px;
  background:#fafafa;color:#1a1a1a;
  -webkit-appearance:none;
}
.checkin-input:focus{outline:none;border-color:#C68B3A;}
.pace-pill{
  display:inline-block;padding:3px 10px;
  border-radius:12px;font-size:11px;font-weight:700;
  margin-top:6px;letter-spacing:.04em;
}
.pace-purple{background:#ede9ff;color:#6A5ACD;}
.pace-green{background:#e8f5e9;color:#388E3C;}
.pace-amber{background:#fff3e0;color:#E65100;}
.pace-red{background:#ffebee;color:#C62828;}
/* ── Company sub-fields ── */
.company-field{margin-bottom:10px;}
.company-field-label{
  font-size:11px;font-weight:600;color:#888;
  margin-bottom:4px;display:flex;align-items:center;gap:6px;
}
.delta{font-size:11px;font-weight:700;}
.delta-good{color:#4CAF50;}
.delta-bad{color:#E53935;}
/* ── Numbers tab ── */
.consistency-table{width:100%;border-collapse:collapse;}
.consistency-table th{
  font-size:10px;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;color:#888;text-align:right;
  padding:8px 14px 8px 8px;border-bottom:1px solid #E8E6E0;
}
.consistency-table th:first-child{text-align:left;padding-left:16px;}
.consistency-table td{
  padding:10px 14px 10px 8px;border-bottom:1px solid #E8E6E0;
  font-size:13px;text-align:right;vertical-align:middle;
}
.consistency-table td:first-child{
  padding-left:16px;text-align:left;font-weight:500;
}
.pct-badge{
  display:inline-block;padding:2px 8px;border-radius:10px;
  font-size:12px;font-weight:700;
}
.pct-green{background:#e8f5e9;color:#388E3C;}
.pct-amber{background:#fff3e0;color:#E65100;}
.pct-red{background:#ffebee;color:#C62828;}
.pct-purple{background:#ede9ff;color:#6A5ACD;}
.pct-none{color:#ccc;font-size:12px;}
/* ── Benchmark table ── */
.bm-section{padding:0;}
.bm-row{
  display:flex;flex-direction:column;
  padding:10px 16px 12px;border-bottom:1px solid #E8E6E0;
  background:#fff;gap:6px;
}
.bm-label{font-size:14px;font-weight:600;display:flex;align-items:baseline;gap:5px;}
.bm-label .bm-sub{font-size:11px;color:#888;font-weight:400;}
.bm-fields{display:flex;gap:8px;}
.bm-field{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.bm-field-lbl{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#bbb;}
.bm-input{
  width:100%;padding:7px 4px;
  border:1.5px solid #E8E6E0;border-radius:7px;
  font-family:'Epilogue',sans-serif;font-size:13px;
  background:#fafafa;text-align:center;color:#1a1a1a;
  -webkit-appearance:none;
}
.bm-input:focus{outline:none;border-color:#C68B3A;}
.bm-input.bm-now{border-color:#C68B3A;background:#fffaf4;}
.save-bm-btn{
  display:block;margin:16px;padding:12px;
  background:#C68B3A;color:#fff;border:none;border-radius:10px;
  font-family:'Epilogue',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;touch-action:manipulation;width:calc(100% - 32px);
}
.save-bm-btn:active{background:#a8722f;}
/* ── Log tab ── */
.log-entry{
  background:#fff;margin-bottom:1px;
  border-bottom:1px solid #E8E6E0;padding:14px 16px;
}
.log-week-label{font-size:13px;font-weight:700;margin-bottom:8px;color:#C68B3A;}
.log-field{
  font-size:12px;padding:2px 0;color:#444;
  display:flex;gap:6px;
}
.log-field-key{font-weight:600;color:#888;flex-shrink:0;}
.export-btn{
  display:block;margin:16px;padding:12px;
  background:#fff;color:#C68B3A;
  border:2px solid #C68B3A;border-radius:10px;
  font-family:'Epilogue',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;touch-action:manipulation;width:calc(100% - 32px);
  text-align:center;
}
.export-btn:active{background:#fff3e0;}
.log-empty{
  text-align:center;padding:60px 24px;color:#aaa;font-size:15px;
}
/* ── Modals ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);
  display:flex;align-items:flex-end;justify-content:center;
  z-index:1000;
}
.modal-sheet{
  background:#fff;width:100%;max-width:480px;
  border-radius:20px 20px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom,0px));
  max-height:85vh;overflow-y:auto;
}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px;}
.modal-option{
  display:flex;align-items:center;
  padding:14px 0;border-bottom:1px solid #E8E6E0;
  gap:14px;cursor:pointer;touch-action:manipulation;
}
.modal-option:last-child{border-bottom:none;}
.modal-option-icon{font-size:22px;width:32px;text-align:center;}
.modal-option-text{font-size:15px;font-weight:500;}
.modal-cancel{
  margin-top:12px;padding:12px;width:100%;
  border:1.5px solid #E8E6E0;border-radius:10px;
  background:#fff;font-family:'Epilogue',sans-serif;
  font-size:14px;font-weight:600;color:#888;
  cursor:pointer;touch-action:manipulation;
}
.modal-checkbox-row{
  display:flex;align-items:center;
  padding:13px 0;border-bottom:1px solid #E8E6E0;
  gap:12px;cursor:pointer;touch-action:manipulation;
}
.modal-checkbox-row:last-child{border-bottom:none;}
.mc-box{
  width:24px;height:24px;border-radius:6px;
  border:2px solid #C68B3A;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.mc-box.checked{background:#C68B3A;}
.mc-box svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.mc-label{font-size:14px;font-weight:500;}
.fast-input-row{
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
}
.fast-input-row input{
  flex:1;padding:10px 12px;border:1.5px solid #E8E6E0;border-radius:8px;
  font-family:'Epilogue',sans-serif;font-size:15px;
  -webkit-appearance:none;
}
.fast-input-row input:focus{outline:none;border-color:#C68B3A;}
.fast-log-confirm{
  width:100%;padding:12px;background:#C68B3A;color:#fff;
  border:none;border-radius:10px;font-family:'Epilogue',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;touch-action:manipulation;
}
/* ── Migration toast ── */
.toast{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  background:#222;color:#fff;padding:10px 20px;border-radius:24px;
  font-size:13px;font-weight:500;z-index:2000;
  white-space:nowrap;pointer-events:none;
  animation:toastIn .3s ease, toastOut .3s ease 2.7s forwards;
}
@keyframes toastIn{from{opacity:0;top:0}to{opacity:1;top:16px}}
@keyframes toastOut{to{opacity:0;top:0}}
/* ── Misc ── */
.card-group{background:#fff;margin-bottom:1px;}
.pb-safe{height:env(safe-area-inset-bottom,0px);}
</style>
</head>
<body>
<div id="app">
  <div id="panel"></div>
  <nav class="tab-bar" id="tab-bar">
    <button class="tab-btn active" id="tb-daily" onclick="switchTab('daily')" aria-label="Daily">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      DAILY
    </button>
    <button class="tab-btn" id="tb-weekly" onclick="switchTab('weekly')" aria-label="Weekly">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      WEEKLY
    </button>
    <button class="tab-btn" id="tb-numbers" onclick="switchTab('numbers')" aria-label="Numbers">
      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      NUMBERS
    </button>
    <button class="tab-btn" id="tb-log" onclick="switchTab('log')" aria-label="Log">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      LOG
    </button>
  </nav>
</div>
<!-- Modal overlay -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="closeModalOverlay(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div id="modal-content"></div>
  </div>
</div>
<script>
// =====================================================================
// DATE UTILITIES — defined first, before all other code
// =====================================================================
function localKey(d) {
  const y  = d.getFullYear();
  const m  = String(d.getMonth() + 1).padStart(2, '0');
  const dy = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dy}`;
}
function todayKey() { return localKey(new Date()); }
function isWeekendDate(d) { const w = d.getDay(); return w === 0 || w === 6; }
function isWeekend() { return isWeekendDate(new Date()); }
function getWeekStart(d) {
  const date = new Date(d);
  date.setHours(0, 0, 0, 0);
  const dow = date.getDay();
  date.setDate(date.getDate() - (dow === 0 ? 6 : dow - 1));
  return date;
}
function fmtDate(d) {
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return MONTHS[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}
function fmtDateShort(d) {
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return MONTHS[d.getMonth()] + ' ' + d.getDate();
}

// =====================================================================
// CONSTANTS & CONFIG
// =====================================================================
// CRITICAL: use local constructor, NOT new Date('2026-03-09')
const CONTEST_START = new Date(2026, 2, 16);  // March 16, 2026 local
const CONTEST_END   = new Date(2026, 9, 2);   // October 2, 2026 local

const KIDS = [
  'Ashton — FaceTime call',
  'Chloe — FaceTime call',
  'Riley — Meal together, no phones',
  'Kate — Meal together, no phones',
];

// habits: id, emoji, name, sub, allDays/weekdayOnly, special
const HABITS = [
  { id:'study',    emoji:'✈️', name:'Aviation study',    sub:'1 hr focused, no passive content', allDays:true,     special:'study'    },
  { id:'exercise', emoji:'🏃', name:'Exercise',          sub:'4mi run / 2000m row / 45min lift',  allDays:true,     special:'exercise' },
  { id:'fast',     emoji:'⏱️', name:'Monthly fast',      sub:'Target 24+ hrs',                   allDays:true,     special:'fast'     },
  { id:'nosugar',  emoji:'🚫', name:'No refined sugar',  sub:'',                                  allDays:true  },
  { id:'noalcohol',emoji:'🍷', name:'No alcohol',        sub:'',                                  allDays:true  },
  { id:'read',     emoji:'📚', name:'Read / listen',     sub:'30 min',                            allDays:true  },
  { id:'journal',  emoji:'📕', name:'Journal',           sub:'',                                  allDays:true  },
  { id:'breathe',  emoji:'😌', name:'Breathe / meditate',sub:'',                                  allDays:true  },
  { id:'plan',     emoji:'📆', name:'Plan tomorrow',     sub:'',                                  allDays:true  },
  { id:'sleep',    emoji:'😴', name:'7+ hrs sleep',      sub:'',                                  allDays:true  },
  { id:'cal',      emoji:'🥗', name:'2600 cal or less',  sub:'',                                  weekdayOnly:true },
  { id:'protein',  emoji:'🥩', name:'150g protein',      sub:'',                                  weekdayOnly:true },
  { id:'barhang',  emoji:'💪', name:'Bar hang',          sub:'10 x 20 sec reps',                  weekdayOnly:true },
];

const WEEKLY_TARGETS = [
  { id:'family',  emoji:'👨‍👧', name:'Family',  detail:'1 per kid / week', target:4, modal:true },
  { id:'flying',  emoji:'✈️', name:'Flying',  detail:'target 4 hrs / week', target:4 },
  { id:'sauna',   emoji:'🧖', name:'Sauna',   detail:'target 3x / week',    target:3 },
  { id:'archery', emoji:'🏹', name:'Archery', detail:'target 2x / week',    target:2 },
  { id:'yoga',    emoji:'🧘', name:'Yoga',    detail:'target 2x / week',    target:2 },
  { id:'fun',     emoji:'🏆', name:'Fun',     detail:'target 2x / week',    target:2 },
];

const CONSISTENCY_HABITS = [
  { id:'noalcohol', emoji:'🍷', label:'No alcohol',          weekdayOnly:false },

}

function loadS() {
  try {
    const raw = localStorage.getItem('endure2');
    if (!raw) return makeState();
    const parsed = JSON.parse(raw);
    // Deep-merge: start with defaults, overlay stored.
    // Snapshot nested defaults BEFORE top-level merge overwrites them.
    const base = makeState();
    const defBm         = {...base.bm};
    const defWtWeek     = {...base.wtWeek};
    const defStudyMonth = {...base.studyMonth};
    const defFastMonth  = {...base.fastMonth};
    const merged = Object.assign(base, parsed);
    // Re-merge each nested object: defaults first, then stored values on top
    merged.bm         = Object.assign(defBm,         parsed.bm         || {});
    merged.wtWeek     = Object.assign(defWtWeek,     parsed.wtWeek     || {});
    merged.studyMonth = Object.assign(defStudyMonth, parsed.studyMonth || {});
    merged.fastMonth  = Object.assign(defFastMonth,  parsed.fastMonth  || {});
    return merged;
  } catch(e) {
    return makeState();
  }
}

function saveS() {
  localStorage.setItem('endure2', JSON.stringify(S));
}

// =====================================================================
// ROLLOVER & RESET CHECKS
// =====================================================================
function checkRollover() {
  const tk = todayKey();

  // Midnight rollover: clear done if date changed
  if (S.lastDate && S.lastDate !== tk) {
    S.done = {};
  }
  S.lastDate = tk;

  // Weekly reset: if week start changed, reset wtWeek counters (not family state in draft)
  const weekStartKey = localKey(getWeekStart(new Date()));
  if (S.wtWeek.weekStart !== weekStartKey) {
    S.wtWeek = {
      family: [false, false, false, false],
      flying: 0, sauna: 0, archery: 0, yoga: 0, fun: 0,
      weekStart: weekStartKey,
    };
    // Reset exercise week count
    S.exWeek = 0;
    S.exWeekStart = weekStartKey;
  }

  // Exercise week start tracking
  if (!S.exWeekStart) S.exWeekStart = weekStartKey;
  if (S.exWeekStart !== weekStartKey) {
    S.exWeek = 0;
    S.exWeekStart = weekStartKey;
  }

  // Monthly reset: clear studyMonth and fastMonth if month changed
  const monthKey = tk.slice(0, 7); // YYYY-MM
  if (S.studyMonth.month && S.studyMonth.month !== monthKey) {
    S.studyMonth = { hrs: 0, month: monthKey };
  }
  if (!S.studyMonth.month) S.studyMonth.month = monthKey;

  if (S.fastMonth.month && S.fastMonth.month !== monthKey) {
    S.fastMonth = { hrs: 0, month: monthKey, logged: false };
  }
  if (!S.fastMonth.month) S.fastMonth.month = monthKey;

  // Sync done with habitLog for today (in case state was already saved)
  if (S.habitLog[tk]) {
    Object.assign(S.done, S.habitLog[tk]);
  }

  saveS();
}

// =====================================================================
function migrateData() {
  if (S.migrated) return;
  S.migrated = true;

  // Attempt to remap UTC-offset date keys
  // Old code used toISOString().slice(0,10) = UTC date
  // In US Mountain (UTC-7), midnight local = UTC+7h same day → no shift for midnight
  // But CONTEST_START as new Date('2026-03-09') = UTC midnight = local March 8 17:00
  // Keys stored from that bug would be 'YYYY-MM-DD' matching UTC, which is correct for current-time keys
  // Just preserve all data and show migration message
  if (S.habitLog && Object.keys(S.habitLog).length > 0) {
    showToast('✅ Data migrated successfully');
  }
  saveS();
}

// =====================================================================
// CONSISTENCY STATS
// =====================================================================
function countEligibleDays(habit, fromDate, toDate) {
  let count = 0;
  let d = new Date(fromDate);
  d.setHours(0, 0, 0, 0);
  const end = new Date(toDate);
  end.setHours(0, 0, 0, 0);
  while (d <= end) {
    const dow = d.getDay();
    if (habit.weekdayOnly) {
      if (dow >= 1 && dow <= 5) count++;
    } else {
      count++;
    }
    d = new Date(d);
    d.setDate(d.getDate() + 1);
  }
  return count;
}

function getConsistencyStats(habit) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const startDate = new Date(CONTEST_START);
  startDate.setHours(0, 0, 0, 0);

  if (today < startDate) return { monthPct:0, runningPct:0, monthLogged:0, monthEligible:0, runningLogged:0, runningEligible:0 };

  const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
  const effectiveMonthStart = monthStart < startDate ? startDate : monthStart;

  // For exercise bonusWeekend: denominator = weekdays only, numerator = all days
  const eligibleHabit = habit.bonusWeekend ? { id: habit.id, weekdayOnly: true } : habit;
  const monthEligible   = countEligibleDays(eligibleHabit, effectiveMonthStart, today);
  const runningEligible = countEligibleDays(eligibleHabit, startDate, today);

  let monthLogged = 0, runningLogged = 0;
  let d = new Date(startDate);
  while (d <= today) {
    const key = localKey(d);
    const dow = d.getDay();
    // bonusWeekend: count all logged days (weekdays + weekends)
    const eligible = habit.bonusWeekend ? true : (!habit.weekdayOnly || (dow >= 1 && dow <= 5));
    if (eligible && S.habitLog[key] && S.habitLog[key][habit.id]) {
      runningLogged++;
      if (d >= effectiveMonthStart) monthLogged++;
    }
    d = new Date(d);
    d.setDate(d.getDate() + 1);
  }

  return {
    monthPct:       monthEligible   > 0 ? Math.round(monthLogged   / monthEligible   * 100) : 0,
    runningPct:     runningEligible > 0 ? Math.round(runningLogged / runningEligible * 100) : 0,
    monthLogged, monthEligible, runningLogged, runningEligible,
  };
}

function pctBadge(pct) {
  const cls = pct > 100 ? 'pct-purple' : pct >= 90 ? 'pct-green' : pct >= 75 ? 'pct-amber' : 'pct-red';
  return `<span class="pct-badge ${cls}">${pct}%</span>`;
}

// =====================================================================
// PACE INDICATOR (pilot hours)
// =====================================================================
function pilotPaceIndicator(actual) {
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date(CONTEST_START); start.setHours(0,0,0,0);
  const end   = new Date(CONTEST_END);   end.setHours(0,0,0,0);
  if (today < start) return '';
  const totalDays   = Math.round((end - start) / 86400000) + 1;
  const elapsedDays = Math.round((today - start) / 86400000) + 1;
  const expected    = (elapsedDays / totalDays) * 100;
  const delta       = actual - expected;
  let cls, label;
  if (delta >= 5)       { cls='pace-purple'; label=`+${delta.toFixed(1)} hrs ahead — on fire 🔥`; }
  else if (delta >= 0)  { cls='pace-green';  label=`On pace (${delta>=0?'+':''}${delta.toFixed(1)} hrs)`; }
  else if (delta >= -5) { cls='pace-amber';  label=`${delta.toFixed(1)} hrs behind pace`; }
  else                  { cls='pace-red';    label=`${delta.toFixed(1)} hrs behind — catch up`; }
  return `<div class="pace-pill ${cls}">${label}</div>`;
}

  const today   = new Date();

  const DAYS    = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const dayName = DAYS[today.getDay()];
  const dateStr = fmtDate(today);

  // Pre-contest splash: show countdown if contest hasn't started yet
  if (today < CONTEST_START) {
    const todayMidnight = new Date(today); todayMidnight.setHours(0,0,0,0);
    const startMidnight = new Date(CONTEST_START); startMidnight.setHours(0,0,0,0);
    const daysLeft = Math.round((startMidnight - todayMidnight) / 86400000);
    const daysLabel = daysLeft === 1 ? '1 day' : `${daysLeft} days`;
    return `<div class="daily-header">
      <div class="day-name">${dayName}</div>
      <div class="date-str">${dateStr}</div>

      <div class="precontest-label">until the contest begins</div>
      <div class="precontest-start">Monday, March 16</div>

  // Active habits for today
  const active  = HABITS.filter(h => !h.weekdayOnly || !weekend);

  const completed = active.filter(h => log[h.id]).length;
  const pct     = active.length > 0 ? Math.round(completed / active.length * 100) : 0;

  let html = `<div class="daily-header">
    <div class="day-name">${dayName}</div>
    <div class="date-str">${dateStr}</div>
  </div>
  <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
  <div class="progress-label">${completed}/${active.length} habits</div>`;

  if (pct >= 100) {
    html += `<div class="all-done-banner">🏆 All done. Every rep compounds.</div>`;

  html += `<div class="section-label">WEEKLY TARGETS</div>

  html += `<div class="section-label">TODAY'S LEAD ACTIONS</div>
  <div class="card-group">`;
  for (const h of active) html += renderHabitRow(h, tk);
  html += `</div><div style="height:16px"></div>`;

  return html;
}

  const others = S.weeklyLog.filter(e => e.weekStart !== ws);
  return others.length ? others[others.length - 1] : null;

function deltaHtml(field, isDebtEquity) {
  const prev = getLastWeekEntry();

  const pv = parseFloat(prev[field]) || 0;

  const d  = cv - pv;
  if (d === 0 || isNaN(d)) return '';

  const sign = d > 0 ? '+' : '';
  return `<span class="delta ${good ? 'delta-good' : 'delta-bad'}">${sign}${d % 1 === 0 ? d : d.toFixed(2)}</span>`;

// =====================================================================
// RENDER: LOG TAB
// =====================================================================
function renderLog() {
  if (!S.weeklyLog.length) {
    return `<div class="log-empty">No weekly entries yet.<br>Complete your first check-in on the Weekly tab.</div>`;
  }

  const entries = [...S.weeklyLog].reverse();
  const LABELS = {
    pilot:'Pilot hrs', sauna:'Sauna', fun:'Fun', archery:'Archery',
    selfGrowth:'Self-Growth', relationship:'Relationship', win:'Win of the Week',
    companyPipeline:'Pipeline', companyProposals:'Proposals', companyRevenue:'Revenue',
    companyGP:'GP/Emp', companyDE:'D/E Ratio',
  };

  let html = `<button class="export-btn" onclick="exportLog()">📤 Export Log (Text)</button>`;

  for (const entry of entries) {
    const ws = new Date(entry.weekStart + 'T12:00:00');
    const we = new Date(ws); we.setDate(we.getDate() + 6);
    const label = `${fmtDateShort(ws)} – ${fmtDateShort(we)}, ${we.getFullYear()}`;
    let fields = '';
    for (const [key, lbl] of Object.entries(LABELS)) {
      if (entry[key]) {
        fields += `<div class="log-field"><span class="log-field-key">${lbl}:</span>${escHtml(String(entry[key]))}</div>`;
      }
    }
    // Family
    if (entry.family) {
      const kidNames = ['Ashton','Chloe','Riley','Kate'];
      const checked = kidNames.filter((_,i) => entry.family[i]);
      if (checked.length) {
        fields += `<div class="log-field"><span class="log-field-key">Family:</span>${checked.join(', ')}</div>`;
      }
    }
    html += `<div class="log-entry">
      <div class="log-week-label">Week of ${label}</div>
      ${fields || '<div class="log-field" style="color:#ccc">No data recorded</div>'}
    </div>`;
  }
  html += `<div style="height:16px"></div>`;
  return html;
}

// =====================================================================
// ACTION HANDLERS
// =====================================================================
function toggleHabit(id) {
  const tk  = todayKey();
  if (!S.habitLog[tk]) S.habitLog[tk] = {};
  const cur = !!S.habitLog[tk][id];
  if (cur) {
    delete S.habitLog[tk][id];
    delete S.done[id];
    // Special cleanup for exercise
    if (id === 'exercise') {
      delete S.exModality[tk];
      S.exWeek = Math.max(0, (S.exWeek || 0) - 1);
    }
  } else {
    S.habitLog[tk][id] = true;
    S.done[id]         = true;
  }
  saveS();
  render();
}

function adjustWT(id, delta) {
  const wt  = WEEKLY_TARGETS.find(w => w.id === id);
  if (!wt) return;
  S.wtWeek[id] = Math.max(0, (S.wtWeek[id] || 0) + delta);
  saveS();
  render();
}

function adjustStudy(delta) {
  const tk = todayKey();
  S.studyMonth.hrs = Math.max(0, (S.studyMonth.hrs || 0) + delta);
  // Mark habit as done if hrs > 0, else unmark
  if (!S.habitLog[tk]) S.habitLog[tk] = {};
  if (S.studyMonth.hrs > 0) {
    S.habitLog[tk]['study'] = true;
    S.done['study'] = true;
  } else {
    delete S.habitLog[tk]['study'];
    delete S.done['study'];
  }
  saveS();
  render();
}

function openExerciseModal() {
  const content = `<div class="modal-title">Choose exercise modality</div>
    <div class="modal-option" onclick="selectModality('run')">
      <span class="modal-option-icon">🏃</span>
      <span class="modal-option-text">Run — 4 miles</span>
    </div>
    <div class="modal-option" onclick="selectModality('row')">
      <span class="modal-option-icon">🚣</span>
      <span class="modal-option-text">Row — 2000m</span>
    </div>
    <div class="modal-option" onclick="selectModality('lift')">
      <span class="modal-option-icon">🏋️</span>
      <span class="modal-option-text">Lift — 45 min</span>
    </div>
    <button class="modal-cancel" onclick="closeModal()">Cancel</button>`;
  openModal(content);
}

function selectModality(mod) {
  const tk = todayKey();
  if (!S.habitLog[tk]) S.habitLog[tk] = {};
  S.habitLog[tk]['exercise'] = true;
  S.done['exercise']         = true;
  S.exModality[tk]           = mod;
  S.exWeek                   = (S.exWeek || 0) + 1;
  closeModal();
  saveS();
  render();
}

function openFamilyModal() {
  const checkSvg = `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;
  let rows = '';
  for (let i = 0; i < 4; i++) {
    const checked = S.wtWeek.family[i];
    rows += `<div class="modal-checkbox-row" onclick="toggleFamilyKid(${i})">
      <div class="mc-box${checked ? ' checked' : ''}">${checked ? checkSvg : ''}</div>
      <span class="mc-label">${KIDS[i]}</span>
    </div>`;
  }
  const content = `<div class="modal-title">👨‍👧 Family — this week</div>
    ${rows}
    <button class="modal-cancel" onclick="closeModal()">Done</button>`;
  openModal(content);
}

function toggleFamilyKid(i) {
  S.wtWeek.family[i] = !S.wtWeek.family[i];
  saveS();
  // Re-render the modal content
  if (document.getElementById('modal-overlay').style.display !== 'none') {
    openFamilyModal();
  } else {
    render();
  }
}

function openFastModal() {
  const content = `<div class="modal-title">⏱️ Log Monthly Fast</div>
    <p style="color:#888;font-size:13px;margin:0 0 14px">How many hours was this fast?</p>
    <div class="fast-input-row">
      <input type="number" inputmode="decimal" id="fast-hrs-input" placeholder="e.g. 24" style="font-size:16px">
      <span style="font-size:14px;color:#888">hrs</span>
    </div>
    <button class="fast-log-confirm" onclick="confirmFast()">Log Fast</button>
    <button class="modal-cancel" style="margin-top:10px" onclick="closeModal()">Cancel</button>`;
  openModal(content);
  setTimeout(() => {
    const inp = document.getElementById('fast-hrs-input');
    if (inp) inp.focus();
  }, 100);
}

function confirmFast() {
  const inp = document.getElementById('fast-hrs-input');
  const hrs = parseFloat(inp ? inp.value : 0) || 0;
  if (hrs <= 0) { alert('Please enter a valid number of hours.'); return; }
  const tk = todayKey();
  if (!S.habitLog[tk]) S.habitLog[tk] = {};
  S.habitLog[tk]['fast'] = true;
  S.done['fast']         = true;
  S.fastMonth = { hrs, month: tk.slice(0,7), logged: true };
  // Update longest fast benchmark if this is longer
  const prev = parseFloat(S.bm.longestFast) || 0;
  if (hrs > prev) S.bm.longestFast = String(hrs);
  closeModal();
  saveS();
  render();
}

function draftInput(field, value) {
  S.draft[field] = value;
  saveS();
  // Re-render only company delta indicators without full re-render
  // (full render would lose cursor position; for text inputs just save)
}

function doSaveWeekly() {
  const ws = getWeekStart(new Date());
  const entry = {
    weekStart: localKey(ws),
    savedAt:   new Date().toISOString(),
    family:    [...S.wtWeek.family],
    ...S.draft,
  };
  const idx = S.weeklyLog.findIndex(e => e.weekStart === entry.weekStart);
  if (idx >= 0) S.weeklyLog[idx] = entry;
  else S.weeklyLog.push(entry);
  S.draft = {};
  saveS();
  // Show success flash
  render();
  setTimeout(() => {
    const el = document.getElementById('weekly-success-msg');
    if (el) el.classList.add('show');
  }, 50);
  setTimeout(() => {
    const el = document.getElementById('weekly-success-msg');
    if (el) el.classList.remove('show');
  }, 3000);
}

function bmInput(field, value) {
  S.bm[field] = value;
  saveS();
}

function saveBenchmarks() {
  S.bmHistory.push({ ...S.bm, savedAt: new Date().toISOString() });
  saveS();
  showToast('✅ Benchmarks saved');
}

function exportLog() {
  if (!S.weeklyLog.length) { alert('No weekly entries to export.'); return; }

  const LABELS = {
    pilot:'Pilot hrs', sauna:'Sauna', fun:'Fun', archery:'Archery',
    selfGrowth:'Self-Growth', relationship:'Relationship', win:'Win of the Week',
    companyPipeline:'Pipeline ($M)', companyProposals:'Proposals ($)',
    companyRevenue:'Revenue ($)', companyGP:'GP/Emp ($)', companyDE:'D/E Ratio',
  };

  let text = 'AGILITY — BETTER YOUR BEST 2026\n';
  text += 'Contest: March 9 – October 2, 2026\n';
  text += `Exported: ${new Date().toLocaleDateString()}\n`;
  text += '═'.repeat(40) + '\n\n';

  for (const entry of [...S.weeklyLog].reverse()) {
    const ws = new Date(entry.weekStart + 'T12:00:00');
    const we = new Date(ws); we.setDate(we.getDate() + 6);
    text += `WEEK OF ${fmtDateShort(ws).toUpperCase()} – ${fmtDateShort(we).toUpperCase()}, ${we.getFullYear()}\n`;
    text += '─'.repeat(30) + '\n';
    for (const [key, lbl] of Object.entries(LABELS)) {
      if (entry[key]) text += `  ${lbl}: ${entry[key]}\n`;
    }
    if (entry.family) {
      const kidNames = ['Ashton','Chloe','Riley','Kate'];
      const checked  = kidNames.filter((_,i) => entry.family[i]);
      if (checked.length) text += `  Family: ${checked.join(', ')}\n`;
    }
    text += '\n';
  }

  // Benchmarks
  text += '═'.repeat(40) + '\nBENCHMARKS\n' + '─'.repeat(30) + '\n';
  const bmLabels = {
    weight:'Weight (lbs)', trailRun:'Trail run', row2k:'2000m row', barHang:'Bar hang',
    deadlift:'Deadlift', bench:'Bench press', restHR:'Resting HR', pilotHrs:'Pilot hours total',
    pipeline:'Pipeline ($M)', proposals:'Proposals', revenue:'Monthly revenue',
    gpPerEmp:'GP/Employee', debtEquity:'D/E Ratio', books:'Books completed', longestFast:'Longest fast (hrs)',
  };
  for (const [key, lbl] of Object.entries(bmLabels)) {
    if (S.bm[key]) text += `  ${lbl}: ${S.bm[key]}\n`;
  }

  // Create download
  const blob = new Blob([text], { type: 'text/plain' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `agility-log-${todayKey()}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// =====================================================================
// MODAL HELPERS
// =====================================================================
function openModal(content) {
  document.getElementById('modal-content').innerHTML = content;
  document.getElementById('modal-overlay').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
  render();
}

function closeModalOverlay(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

// =====================================================================
// TAB SWITCHING
// =====================================================================
function switchTab(tab) {
  activeTab = tab;
  render();
  // Update tab bar highlights
  ['daily','weekly','numbers','log'].forEach(t => {
    const btn = document.getElementById(`tb-${t}`);
    if (btn) btn.classList.toggle('active', t === tab);
  });
  // Scroll to top
  const panel = document.getElementById('panel');
  if (panel) panel.scrollTop = 0;
}

// =====================================================================
// RENDER (main)
// =====================================================================
function render() {
  const panel = document.getElementById('panel');
  if (!panel) return;
  if (activeTab === 'daily')   panel.innerHTML = renderDaily();
  else if (activeTab === 'weekly')  panel.innerHTML = renderWeekly();
  else if (activeTab === 'numbers') panel.innerHTML = renderNumbers();
  else if (activeTab === 'log')     panel.innerHTML = renderLog();
  // Update tab bar
  ['daily','weekly','numbers','log'].forEach(t => {
    const btn = document.getElementById(`tb-${t}`);
    if (btn) btn.classList.toggle('active', t === activeTab);
  });
}

// =====================================================================
// UTILITIES
// =====================================================================
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { if (t.parentNode) t.parentNode.removeChild(t); }, 3100);
}

// =====================================================================
// APP ICON GENERATOR
// =====================================================================
function setAppIcon() {
  try {
    const canvas = document.createElement('canvas');
    canvas.width = canvas.height = 180;
    const ctx = canvas.getContext('2d');
    // Rounded background
    ctx.beginPath();
    const r = 36;
    const [w,h] = [180,180];
    ctx.moveTo(r,0); ctx.lineTo(w-r,0); ctx.arcTo(w,0,w,r,r);
    ctx.lineTo(w,h-r); ctx.arcTo(w,h,w-r,h,r);
    ctx.lineTo(r,h); ctx.arcTo(0,h,0,h-r,r);
    ctx.lineTo(0,r); ctx.arcTo(0,0,r,0,r); ctx.closePath();
    ctx.fillStyle = '#1a1a1a'; ctx.fill();
    // Target rings (grayscale)
    [[82,'#444'],[58,'#666'],[34,'#888']].forEach(([rad,col]) => {
      ctx.beginPath(); ctx.arc(90,90,rad,0,Math.PI*2);
      ctx.strokeStyle = col; ctx.lineWidth = 7; ctx.stroke();
    });
    // Bullseye (lime green)
    ctx.beginPath(); ctx.arc(90,90,11,0,Math.PI*2);
    ctx.fillStyle = '#84cc16'; ctx.fill();
    document.getElementById('app-icon').href = canvas.toDataURL('image/png');
  } catch(e) {}
}

// =====================================================================
// INIT
// =====================================================================
function init() {
  S = loadS();
  migrateData();
  checkRollover();
  setAppIcon();
  render();
}

init();
